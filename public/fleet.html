<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fleet Overview — NETMON</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>

  <div class="page-loader">
    <div class="loader-ring"></div>
    <div class="loader-text mono">POLLING FLEET…</div>
  </div>

  <div class="app-shell">
    <div class="nav-overlay"></div>

    <nav class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-mark">N</div>
        <span class="brand-name">NETMON</span>
      </div>
      <div class="sidebar-scroll">
        <div class="nav-section">
          <div class="nav-section-title">Fleet</div>
          <ul class="nav-list">
            <li><a href="fleet.html" class="nav-item active">
              <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg></span>
              <span class="nav-label">Overview</span>
            </a></li>
            <li><a href="alerts.html" class="nav-item">
              <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg></span>
              <span class="nav-label">Alerts</span>
              <span class="nav-badge" data-alert-badge style="display:none;"></span>
            </a></li>
            <li><a href="settings.html" class="nav-item">
              <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 11-4 0v-.09A1.65 1.65 0 009.6 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 110-4h.09A1.65 1.65 0 004.6 9.6a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 114 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 110 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg></span>
              <span class="nav-label">Settings</span>
            </a></li>
          </ul>
        </div>
      </div>
      <div class="sidebar-footer">
        <button class="sidebar-collapse-btn" type="button" aria-label="Collapse sidebar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
          <span class="nav-label">Collapse</span>
        </button>
      </div>
    </nav>

    <header class="topbar">
      <div class="topbar-left">
        <button class="mobile-nav-toggle" aria-label="Open navigation">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
        </button>
        <div class="device-identity">
          <span class="name">All Devices</span>
          <span class="ip mono" id="fleet-count">—</span>
        </div>
        <span class="conn-status"><span class="conn-dot"></span>LIVE</span>
      </div>
      <div class="topbar-right">
        <button class="theme-toggle-switch" aria-label="Toggle dark mode" aria-pressed="false"></button>
        <button class="icon-btn" aria-label="Notifications" onclick="window.location.href='alerts.html'">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg>
          <span class="badge-count" data-alert-badge style="display:none;"></span>
        </button>
        <div class="user-chip">
          <div class="user-avatar">AD</div>
          <span class="uname">admin</span>
        </div>
      </div>
    </header>

    <main class="main-content">
      <div class="page-header">
        <div>
          <h1 class="page-title">Fleet Overview</h1>
          <p class="page-subtitle">Real status for every configured device, refreshed every 3 seconds</p>
        </div>
      </div>

      <div class="fleet-grid" id="fleet-grid"></div>
    </main>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/app-shell.js"></script>
  <script src="js/api.js"></script>
  <script src="js/fleet.js"></script>
  <script>
    (function () {
      const countEl = document.getElementById('fleet-count');
      async function updateCount() {
        try {
          const devices = await Api.getFleetSummary();
          const online = devices.filter((d) => d.online).length;
          countEl.textContent = `${online}/${devices.length} online`;
        } catch (e) { /* banner already shown by fleet.js */ }
      }
      updateCount();
      setInterval(updateCount, 3000);
    })();
  </script>
</body>
</html>
