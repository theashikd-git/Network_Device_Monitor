          <ul class="nav-list">
            <li><a href="fleet.html" class="nav-item">
              <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg></span>
              <span class="nav-label">Overview</span>
            </a></li>
            <li><a href="alerts.html" class="nav-item active">

              <span class="nav-label">Alerts</span>
              <span class="nav-badge" data-alert-badge style="display:none;"></span>
            </a></li>
            <li><a href="settings.html" class="nav-item">
              <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 11-4 0v-.09A1.65 1.65 0 009.6 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 110-4h.09A1.65 1.65 0 004.6 9.6a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 114 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 110 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg></span>

      <div class="sidebar-footer">

    <header class="topbar">
      <div class="topbar-left">
        <button class="mobile-nav-toggle" aria-label="Open navigation">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
        </button>
        <div class="device-identity">
          <span class="name">MikroTik-CCR2004</span>
          <span class="ip mono">192.168.88.1</span>
        </div>
        <div class="pulse-strip">
          <svg viewBox="0 0 120 28">
            <path class="pulse-line" d="M0,14 L120,14" />
            <circle class="pulse-dot" cx="116" cy="14" r="3" />
          </svg>
        </div>
        <span class="conn-status"><span class="conn-dot"></span>LIVE</span>
      </div>
      <div class="topbar-right">
        <button class="theme-toggle-switch" aria-label="Toggle dark mode" aria-pressed="false"></button>
        <button class="icon-btn" aria-label="Notifications" onclick="window.location.href='alerts.html'">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg>
          <span class="badge-count" data-alert-badge style="display:none;"></span>

        <div class="user-chip">
          <div class="user-avatar">AD</div>
          <span class="uname">admin</span>
        </div>
      </div>
    </header>

    <main class="main-content">
      <div class="page-header">
        <div>
          <h1 class="page-title">Alerts</h1>
          <p class="page-subtitle">Everything triggered by CPU, memory, or interface thresholds</p>
        </div>
        <div style="display:flex; gap:8px;">
          <button class="btn btn-danger-outline" id="clear-alerts-page-btn">Clear all</button>
        </div>
      </div>

      <div class="panel">
        <div class="panel-body">
          <div class="alert-list" id="alert-list" style="max-height: none;"></div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/app-shell.js"></script>
  <script>
    // Minimal local AlertCenter-style renderer for this standalone page.
    document.addEventListener('DOMContentLoaded', () => {
      const listEl = document.getElementById('alert-list');

      function render() {
        const alerts = Storage.get(Storage.KEYS.ALERTS, []);
        if (alerts.length === 0) {
          listEl.innerHTML = `
            <div class="empty-state">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M9 12l2 2 4-4M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
              <div class="empty-title">No active alerts</div>
              <div class="empty-sub">Everything is within normal thresholds. New alerts will appear here automatically.</div>
            </div>`;
          return;
        }
        const icons = {
          critical: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>',
          warning: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>',
          info: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 16v-4m0-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>',
        };
        listEl.innerHTML = alerts.map((a) => `
          <div class="alert-item" data-severity="${a.severity}" data-alert-id="${a.id}">
            <div class="alert-icon">${icons[a.severity] || icons.info}</div>
            <div class="alert-body">
              <div class="alert-msg">${Utils.escapeHtml(a.message)}</div>
              <div class="alert-meta">${Utils.timeAgo(a.ts)}</div>
            </div>
            <button class="alert-dismiss" aria-label="Dismiss alert" data-dismiss="${a.id}">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
          </div>
        `).join('');

        listEl.querySelectorAll('[data-dismiss]').forEach((btn) => {
          btn.addEventListener('click', () => {
            const id = btn.dataset.dismiss;
            const el = listEl.querySelector(`[data-alert-id="${id}"]`);
            el.classList.add('dismissing');
            setTimeout(() => {
              const remaining = Storage.get(Storage.KEYS.ALERTS, []).filter((a) => a.id !== id);
              Storage.set(Storage.KEYS.ALERTS, remaining);
              window.AlertBadge.refresh();
              render();
            }, 190);
          });
        });
      }

      document.getElementById('clear-alerts-page-btn').addEventListener('click', () => {
        Storage.set(Storage.KEYS.ALERTS, []);
        window.AlertBadge.refresh();
        render();
      });

      render();
      setInterval(render, 10000);
    });
  </script>
</body>
</html>
